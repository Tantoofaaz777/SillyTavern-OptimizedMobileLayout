<div class="chat-card-layout-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Chat Card Layout</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">

            <label class="checkbox_label">
                <input id="ccl_enabled" type="checkbox" />
                <span>Enable card layout</span>
            </label>

            <hr>

            <div class="ccl-input-block">
                <label for="ccl_font_size">Text size</label>
                <small>e.g. 16px, 1rem, 1.1em</small>
                <input id="ccl_font_size" class="text_pole" type="text" placeholder="16px" />
            </div>

            <div class="ccl-input-block">
                <label for="ccl_line_height">Line spacing</label>
                <small>e.g. 1.6, 2, 24px</small>
                <input id="ccl_line_height" class="text_pole" type="text" placeholder="1.6" />
            </div>

            <div class="ccl-input-block">
                <label for="ccl_avatar_size">Avatar size</label>
                <small>e.g. 40px, 56px, 80px</small>
                <input id="ccl_avatar_size" class="text_pole" type="text" placeholder="56px" />
            </div>

            <div class="ccl-input-block">
                <label for="ccl_name_size">Name size</label>
                <small>e.g. 16px, 1.2rem, 1.5em</small>
                <input id="ccl_name_size" class="text_pole" type="text" placeholder="1.15em" />
            </div>

        </div>
    </div>
</div>
